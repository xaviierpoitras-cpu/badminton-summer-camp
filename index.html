<style>
:root{
  --bg:#f7f6f2;--surface:#fff;--surface2:#f0ede6;--border:#e2ddd6;
  --text:#1a1814;--text2:#6b6660;--text3:#a09b96;
  --accent:#1C2F5E;--accent-bg:#e8edf5;--accent-text:#1C2F5E;
  --warn:#92400e;--warn-bg:#fef3c7;
  --danger:#991b1b;--danger-bg:#fee2e2;
  --adv1:#2d5a3d;--adv1-bg:#eaf2ed;
  --adv2:#1e40af;--adv2-bg:#eff6ff;
  --int1:#6d28d9;--int1-bg:#f5f3ff;
  --int2:#b45309;--int2-bg:#fef3c7;
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:380px;max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{font-size:36px;display:block;margin-bottom:10px}
.login-card h2{font-size:20px;font-weight:600;margin-bottom:4px}
.login-card .sub{font-size:14px;color:var(--text2);margin-bottom:1.5rem;line-height:1.5}
.pin-wrap{display:flex;gap:10px;margin-bottom:1rem}
.pin-digit{width:60px;height:68px;font-size:28px;font-family:'DM Mono',monospace;font-weight:500;text-align:center;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.pin-digit:focus{border-color:var(--accent)}
.pin-error{font-size:13px;color:var(--danger);margin-bottom:8px;display:none}
.btn-login{width:100%;padding:12px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.btn-login:hover{opacity:.88}
.admin-link{display:block;text-align:center;margin-top:1rem;font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;text-decoration:underline}
.admin-fields{display:none;margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem}
.admin-fields input{width:100%;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:8px}
.admin-fields input:focus{border-color:var(--accent)}
.loading-msg{font-size:13px;color:var(--text3);text-align:center;padding:1rem 0;display:none}

/* HEADER */
.app-header{background:var(--accent);color:#fff;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px;flex-wrap:wrap}
.app-header h1{font-size:17px;font-weight:600}
.app-header p{font-size:11px;opacity:.7;font-family:'DM Mono',monospace}
.header-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.user-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 10px 4px 5px;font-size:12px;font-weight:500;color:#fff}
.user-av{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;font-family:'DM Mono',monospace}
.hbtn{padding:6px 12px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.8);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.hbtn:hover{background:rgba(255,255,255,.12);color:#fff}
.hbtn.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.4)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 56px)}
.main-area{flex:1;padding:1.25rem;overflow-x:auto;min-width:0}
.side-panel{width:260px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);padding:1rem;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}

/* LEGEND */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot-avail{background:#22c55e}
.dot-reserved{background:#f59e0b}

/* GROUP BADGES */
.gbadge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace}
.gbadge-adv1{background:var(--adv1-bg);color:var(--adv1)}
.gbadge-adv2{background:var(--adv2-bg);color:var(--adv2)}
.gbadge-int1{background:var(--int1-bg);color:var(--int1)}
.gbadge-int2{background:var(--int2-bg);color:var(--int2)}

/* GRID */
.week-block{margin-bottom:1rem}
.week-title{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;margin-bottom:6px;padding:4px 0;border-bottom:1px solid var(--border)}
.grid-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.grid-table th{padding:9px 12px;text-align:center;font-size:12px;font-weight:600;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
.grid-table th:first-child{text-align:left;min-width:100px}
.grid-table td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.grid-table td:first-child{text-align:left;font-size:13px;font-weight:500;color:var(--text);white-space:nowrap}
.grid-table tr:last-child td{border-bottom:none}
.grid-table tr:hover td{background:var(--surface2)}
.spot-dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.spot-dot.avail{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2)}
.spot-dot.reserved{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.cell-btn{cursor:pointer;padding:4px 8px;border-radius:var(--radius);display:inline-flex;flex-direction:column;align-items:center;gap:3px;transition:background .15s}
.cell-btn:hover{background:var(--surface2)}
.cell-count{font-size:10px;color:var(--text3)}

/* SIDE */
.side-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.side-badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace}
.side-item{padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .15s}
.side-item:hover{border-color:var(--accent);background:var(--accent-bg)}
.side-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:capitalize;margin-top:3px}
.side-price{font-size:12px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace;margin-top:2px}
.side-empty{font-size:13px;color:var(--text3);font-style:italic;text-align:center;padding:1rem 0}

/* ADMIN */
.admin-banner{background:var(--danger-bg);color:var(--danger);border:1px solid #fca5a5;border-radius:var(--radius);padding:8px 14px;font-size:13px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:1rem}
.panel h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text)}
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.form-group{flex:1;min-width:130px}
.form-group label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.form-group select,.form-group input{width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.form-group select:focus,.form-group input:focus{border-color:var(--accent)}
.btn-green{padding:9px 16px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.btn-green:hover{opacity:.88}
.btn-red{padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-red:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-bg)}
.admin-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface2);border-radius:var(--radius);margin-bottom:6px;gap:8px}
.admin-row-info{font-size:13px;color:var(--text)}
.admin-row-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.5rem;width:360px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:17px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:1rem}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
.btn-primary{flex:1;padding:10px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-cancel{padding:10px 18px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-cancel:hover{background:var(--surface2)}
.info-box{background:var(--accent-bg);border:1px solid #b6d9c4;border-radius:var(--radius);padding:14px 16px;margin-top:1rem}
.info-box p{font-size:14px;color:var(--accent-text);margin-bottom:5px}
.info-price{font-size:18px;font-weight:700;color:var(--accent-text);margin-top:8px;font-family:'DM Mono',monospace}
.warn-box{background:var(--warn-bg);border:1px solid #fcd34d;border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--warn)}

@media(max-width:700px){
  .side-panel{display:none}
  .layout{flex-direction:column}
  .main-area{padding:.75rem}
  .pin-digit{width:52px;height:60px;font-size:24px}
}
</style>

const FR_DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d){return `${FR_DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;}
function dateId(d){return d.toISOString().split('T')[0];}

function genSchedule(){
  const start=new Date(2026,6,6);
  const weeks=[];
  for(let w=0;w<6;w++){
    const days=[];
    [[0,'Mon'],[1,'Tue'],[2,'Wed'],[3,'Thu']].forEach(([off,key])=>{
      const d=new Date(start);d.setDate(d.getDate()+w*7+off);
      const isFirst3=w<3;
      days.push({date:d,label:fmtDate(d),id:dateId(d),key,
        groups:key==='Tue'?(isFirst3?['int1']:['int2']):(isFirst3?['adv1']:['adv2'])
      });
    });
    weeks.push({week:w+1,days});
  }
  return weeks;
}

// SHA-256 hash for PINs
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Real-time spots listener
function startSpotsListener(){
  db.collection('spots').onSnapshot(snap=>{
    spots={};
    snap.forEach(doc=>{spots[doc.id]=doc.data();});
    if(currentUser) renderAll();
  });
}

function pinInput(i){
  const v=document.getElementById(`p${i}`).value;
  if(v&&i<3)document.getElementById(`p${i+1}`).focus();
  document.getElementById('pin-error').style.display='none';
}
function pinKey(e,i){
  if(e.key==='Backspace'&&!document.getElementById(`p${i}`).value&&i>0)document.getElementById(`p${i-1}`).focus();
  if(e.key==='Enter')checkPin();
}
function getPin(){return [0,1,2,3].map(i=>document.getElementById(`p${i}`).value).join('');}

async function checkPin(){
  const pin=getPin();
  if(pin.length<4){document.getElementById('pin-error').style.display='block';return;}
  document.getElementById('loading-msg').style.display='block';
  document.getElementById('pin-error').style.display='none';
  try{
    await auth.signInAnonymously();
    const hash=await sha256(pin);
    const snap=await db.collection('players').where('pinHash','==',hash).limit(1).get();
    if(snap.empty){
      document.getElementById('pin-error').style.display='block';
      document.getElementById('loading-msg').style.display='none';
      [0,1,2,3].forEach(i=>document.getElementById(`p${i}`).value='');
      document.getElementById('p0').focus();
    } else {
      const playerData = snap.docs[0].data();
      currentUser={...playerData, docId:snap.docs[0].id, crossGroupPermission: !!playerData.crossGroupPermission};
      enterApp();
    }
  } catch(e){
    document.getElementById('pin-error').textContent='Connection error. Try again.';
    document.getElementById('pin-error').style.display='block';
    document.getElementById('loading-msg').style.display='none';
  }
}

function spotLevel(grp){ return grp.startsWith('adv') ? 'advanced' : 'intermediate'; }

function canReserve(spot){
  if(!currentUser || currentUser.isAdmin) return false;
  const sLevel = spotLevel(spot.group);
  const pLevel = currentUser.group; // 'advanced' or 'intermediate'
  if(sLevel === pLevel) return true;
  if(currentUser.crossGroupPermission) return true; // admin backdoor
  return false;
}

function getSpotsFor(dateId,grp){
  return Object.entries(spots).filter(([k,v])=>v.dateId===dateId&&v.group===grp);
}

function renderGrid(){

    <span style="font-size:12px;font-weight:500;color:var(--text2)">Legend:</span>
    <div class="legend-item"><div class="dot dot-avail"></div>Available</div>
    <div class="legend-item"><div class="dot dot-reserved"></div>Reserved</div>
  </div>`;

  const thColors={adv1:'var(--adv1)',adv2:'var(--adv2)',int1:'var(--int1)',int2:'var(--int2)'};

  SCHEDULE.forEach(({week,days})=>{
    html+=`<div class="week-block">
      <div class="week-title">Week ${week} &nbsp;·&nbsp; ${days[0].label} – ${days[3].label}</div>
      <table class="grid-table">
        <thead><tr><th>Date</th>
          ${Object.entries(GROUPS).map(([g,info])=>`<th style="color:${thColors[g]}">${info.label}<br><span style="font-size:10px;font-weight:400;opacity:.7">${info.weeks}</span></th>`).join('')}
        </tr></thead>
        <tbody>`;
    days.forEach(day=>{
      html+=`<tr><td>${day.label}</td>`;
      Object.keys(GROUPS).forEach(grp=>{
        if(!day.groups.includes(grp)){html+=`<td style="color:var(--border);font-size:16px">—</td>`;return;}
        const entries=getSpotsFor(day.id,grp);
        if(!entries.length){html+=`<td><span style="font-size:11px;color:var(--text3)">–</span></td>`;return;}
        const avail=entries.filter(([k,s])=>!s.reservedBy).length;
        const res=entries.filter(([k,s])=>s.reservedBy).length;
        html+=`<td><div class="cell-btn" onclick="showCellModal('${day.id}','${grp}','${day.label}')">
          <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">
            ${entries.map(([k,s])=>`<div class="spot-dot ${s.reservedBy?'reserved':'avail'}"></div>`).join('')}
          </div>
          <div class="cell-count">${avail?avail+' avail':''}${avail&&res?' · ':''}${res?res+' res.':''}</div>
        </div></td>`;
      });
      html+=`</tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById('main-area').innerHTML=html;
}

function renderAdminWeekGrid(){

      <table style="width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;font-size:12px">
        <thead><tr>
          <th style="padding:7px 10px;text-align:left;background:var(--surface2);border-bottom:1px solid var(--border);font-weight:600;color:var(--text2);min-width:90px">Date</th>
          ${Object.entries(GROUPS).map(([g,info])=>`<th style="padding:7px 10px;text-align:center;background:var(--surface2);border-bottom:1px solid var(--border);font-weight:600;color:${thColors[g]}">${info.label}</th>`).join('')}
        </tr></thead>
        <tbody>`;

    days.forEach(day=>{
      html+=`<tr>
        <td style="padding:7px 10px;border-bottom:1px solid var(--border);font-weight:500;color:var(--text);white-space:nowrap">${day.label}</td>`;
      Object.keys(GROUPS).forEach(grp=>{
        if(!day.groups.includes(grp)){
          html+=`<td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:center;color:var(--border)">—</td>`;
          return;
        }
        const entries=getSpotsFor(day.id,grp);
        if(!entries.length){
          html+=`<td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:center;color:var(--text3)">–</td>`;
          return;
        }
        let cellContent=entries.map(([key,s])=>{
          const isRes=!!s.reservedBy;
          const isPaid=!!s.paid;
          return `<div style="margin:2px 0;padding:3px 6px;border-radius:6px;background:${isRes?(isPaid?'#DCFCE7':'#FFF7ED'):'#EFF6FF'};border:1px solid ${isRes?(isPaid?'#86EFAC':'#FED7AA'):'#BFDBFE'}">

          </div>`;
        }).join('');
        html+=`<td style="padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top">${cellContent}</td>`;
      });
      html+=`</tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  html+=`</div>`;
  return html;
}

                  : `<span style="background:#FEF9C3;color:#854D0E;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid #FDE047">⏳ Payment pending</span>`}
              </div>
            </div>
            <button class="btn-cancel" style="font-size:13px;padding:7px 14px;color:var(--danger);border-color:var(--danger)" 
              onclick="cancelReservation('${key}')">Cancel</button>
          </div>
        </div>`;
      });
    });
  }

  el.innerHTML = html;
}

let payFilter = 'all';

let paymentsUnsubscribe = null;

function renderPayments(){
  const el = document.getElementById('main-area');
  if(!el){ setTimeout(renderPayments, 200); return; }
  el.innerHTML = '<p style="color:var(--text3);padding:2rem;text-align:center">Loading payments...</p>';

  // Cancel previous listener if any
  if(paymentsUnsubscribe){ paymentsUnsubscribe(); paymentsUnsubscribe=null; }

  paymentsUnsubscribe = db.collection('players').onSnapshot(snap => {
    const players = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    if(!players.length){
      document.getElementById('main-area').innerHTML = '<p style="color:var(--text3);padding:2rem;text-align:center">No players found. Add players first.</p>';
      return;
    }
    buildPaymentsUI(players);
  }, err => {
    document.getElementById('main-area').innerHTML = `<p style="color:var(--danger);padding:2rem;text-align:center">Error: ${err.message}</p>`;
  });
}

function buildPaymentsUI(players){
  const el = document.getElementById('main-area');
  if(!el) return;

  const price  = p => (p.price || (p.group==='advanced'?250:78));
  const due    = p => (p.inBloc1?price(p):0)+(p.inBloc2?price(p):0);
  const paid   = p => (p.bloc1Paid?price(p):0)+(p.bloc2Paid?price(p):0);
  const bal    = p => due(p)-paid(p);

  const allDue   = players.reduce((s,p)=>s+due(p),0);
  const allPaid  = players.reduce((s,p)=>s+paid(p),0);
  const paidFull = players.filter(p=>bal(p)===0&&due(p)>0).length;
  const emailSent = players.filter(p=>(p.inBloc1&&p.bloc1EmailSent)||(p.inBloc2&&p.bloc2EmailSent)).length;

  let filtered = [...players];
  if(payFilter==='unpaid')          filtered=players.filter(p=>bal(p)>0);
  if(payFilter==='paid')            filtered=players.filter(p=>bal(p)===0&&due(p)>0);
  if(payFilter==='email-not-sent')  filtered=players.filter(p=>(p.inBloc1&&!p.bloc1EmailSent)||(p.inBloc2&&!p.bloc2EmailSent));
  if(payFilter==='advanced')        filtered=players.filter(p=>p.group==='advanced');
  if(payFilter==='intermediate')    filtered=players.filter(p=>p.group==='intermediate');

  let html=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px">
    <div>
      <h2 style="font-size:18px;font-weight:600;color:var(--text)">Payment Tracking</h2>
      <p style="font-size:13px;color:var(--text2);margin-top:2px">${players.length} players · Bloc payments</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="downloadPaymentExcel()" style="padding:7px 14px;border-radius:var(--radius);border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent-text);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif">⬇️ Download Excel</button>
      <button onclick="seedBlocData()" style="padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif">↓ Sync from Excel</button>
    </div>
  </div>

  <div class="stats" style="margin-bottom:1.25rem">
    <div class="stat"><div class="stat-label">Total due</div><div class="stat-value" style="font-size:18px">$${allDue.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">Collected</div><div class="stat-value" style="font-size:18px;color:var(--accent)">$${allPaid.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">Outstanding</div><div class="stat-value" style="font-size:18px;color:var(--danger)">$${(allDue-allPaid).toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">Fully paid</div><div class="stat-value" style="font-size:18px">${paidFull}/${players.length}</div></div>
    <div class="stat"><div class="stat-label">Emails sent</div><div class="stat-value" style="font-size:14px;margin-top:2px">B1 ${b1Email}/${b1Total}<br>B2 ${b2Email}/${b2Total}</div></div>
  </div>

  <div class="group-tabs" style="margin-bottom:1.25rem">
    ${[['all','All'],['unpaid','Unpaid'],['paid','Paid'],['email-not-sent','Email pending'],['advanced','Advanced'],['intermediate','Intermediate']].map(([f,l])=>
      `<button class="gtab${payFilter===f?' active':''}" onclick="setPayFilter('${f}')">${l}</button>`
    ).join('')}
  </div>`;

  if(!filtered.length){
    html+=`<div style="text-align:center;padding:3rem;color:var(--text3);font-size:14px">No players match this filter.</div>`;
  } else {
    filtered.forEach(p=>{
      const b1paid=!!p.bloc1Paid, b2paid=!!p.bloc2Paid;
      const b1email=!!p.bloc1EmailSent, b2email=!!p.bloc2EmailSent;
      const pDue=due(p), pPaid=paid(p), pBal=bal(p);
      const fullyPaid = pBal===0&&pDue>0;

      html+=`<div class="practice-card" style="margin-bottom:8px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">

          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
              <span style="font-size:15px;font-weight:600;color:var(--text)">${p.name}</span>
              <span class="gbadge ${p.group==='advanced'?'gbadge-adv1':'gbadge-int1'}">${p.subgroup||p.group}</span>
              ${fullyPaid
                ?`<span style="background:var(--accent-bg);color:var(--accent-text);font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;border:1px solid #b6d9c4">✅ Fully paid</span>`
                :pBal>0?`<span style="background:var(--warn-bg);color:var(--warn);font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;border:1px solid #fcd34d">$${pBal} outstanding</span>`:''}
            </div>

            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 12px;background:var(--surface2);border-radius:var(--radius)">
                <span style="font-size:13px;color:var(--text2)">
                  ${p.inBloc1&&p.inBloc2?'Blocs 1 & 2':p.inBloc1?'Bloc 1':p.inBloc2?'Bloc 2':'No bloc assigned'}
                </span>
                ${pDue>0?`<span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--text)">$${pDue}</span>`:''}
                ${pDue>0?`<span style="font-size:12px;padding:2px 8px;border-radius:20px;font-weight:500;background:${fullyPaid?'#DCFCE7':'#FEF9C3'};color:${fullyPaid?'#166534':'#854D0E'};border:1px solid ${fullyPaid?'#86EFAC':'#FDE047'}">${fullyPaid?'✅ Paid':'⏳ Unpaid'}</span>`:''}
                ${fullyPaid&&(p.bloc1PaidDate||p.bloc2PaidDate)?`<span style="font-size:11px;color:var(--text3)">📅 ${p.bloc1PaidDate||p.bloc2PaidDate}</span>`:''}
                ${pDue>0?`<button style="padding:4px 12px;font-size:12px;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid ${fullyPaid?'var(--border)':'var(--accent)'};background:${fullyPaid?'transparent':'var(--accent-bg)'};color:${fullyPaid?'var(--text2)':'var(--accent-text)'}" onclick="togglePaymentAll('${p.id}',${fullyPaid},${!!p.inBloc1},${!!p.inBloc2})">${fullyPaid?'Mark unpaid':'Mark paid'}</button>`:''}
                <span style="margin-left:auto;display:flex;align-items:center;gap:4px">
                  <label style="font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;cursor:pointer"><input type="checkbox" ${p.inBloc1?'checked':''} onchange="updateBloc('${p.id}','inBloc1',this.checked)"> B1</label>
                  <label style="font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;cursor:pointer"><input type="checkbox" ${p.inBloc2?'checked':''} onchange="updateBloc('${p.id}','inBloc2',this.checked)"> B2</label>
                </span>
            </div>
          </div>

          <div style="text-align:right;flex-shrink:0;padding-top:2px">
            <div style="font-size:14px;font-weight:600;color:var(--text)">$${pPaid} / $${pDue}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;margin-bottom:8px">${p.email}</div>
            <button style="padding:5px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid ${b1email||b2email?'var(--border)':'#86EFAC'};background:${b1email||b2email?'transparent':'#DCFCE7'};color:${b1email||b2email?'var(--text3)':'#166534'};display:block;width:100%;text-align:center" onclick="toggleEmailAll('${p.id}',${b1email||b2email},${!!p.inBloc1},${!!p.inBloc2})">${b1email||b2email?'✉️ Email sent':'Send email'}</button>
            ${(b1email||b2email)&&(p.bloc1EmailDate||p.bloc2EmailDate)?`<div style="font-size:10px;color:var(--text3);margin-top:4px">${p.bloc1EmailDate||p.bloc2EmailDate}</div>`:''}
          </div>

        </div>
      </div>`;
    });
  }

  document.getElementById('main-area').innerHTML = html;
}

function setPayFilter(f){ payFilter=f; renderPayments(); }

async function updateBloc(id, field, value){
  const priceSnap = await db.collection('players').doc(id).get();
  const p = priceSnap.data();
  const update = {[field]: value};
  await db.collection('players').doc(id).update(update);
  renderPayments();
}

async function downloadPaymentExcel(){
  let snap;
  try {
    snap = await db.collection('players').get();
  } catch(e) {
    document.getElementById('main-area').innerHTML = `<p style="color:var(--danger);padding:2rem;text-align:center">Error loading players: ${e.message}</p>`;
    return;
  }
  const players = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name));
  const priceOf = p => p.price||(p.group==='advanced'?250:78);
  const due  = p => (p.inBloc1?priceOf(p):0)+(p.inBloc2?priceOf(p):0);
  const paid = p => (p.bloc1Paid?priceOf(p):0)+(p.bloc2Paid?priceOf(p):0);

  const rows = players.map(p=>({
    'Nom':          p.name,
    'Email':        p.email,
    'Groupe':       p.group==='advanced'?'Avancé':'Intermédiaire',
    'Sous-groupe':  p.subgroup||'',
    'Bloc 1':       p.inBloc1?'Oui':'Non',
    'Bloc 2':       p.inBloc2?'Oui':'Non',
    'Total dû':     due(p),
    'Total payé':   paid(p),
    'Balance':      due(p)-paid(p),
    'Bloc 1 payé':  p.bloc1Paid?'Oui':'Non',
    'Date paiement B1': p.bloc1PaidDate||'',
    'Bloc 2 payé':  p.bloc2Paid?'Oui':'Non',
    'Date paiement B2': p.bloc2PaidDate||'',
    'Email envoyé': (p.bloc1EmailSent||p.bloc2EmailSent)?'Oui':'Non',
    'Date email':   p.bloc1EmailDate||p.bloc2EmailDate||'',
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Paiements');

  // Auto column widths
  const cols = Object.keys(rows[0]).map(k=>({wch:Math.max(k.length,12)}));
  ws['!cols'] = cols;

  const today = new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb, 'paiements_badminton_'+today+'.xlsx');
}

async function togglePaymentAll(id, current, inBloc1, inBloc2){
  const today = new Date().toISOString().split('T')[0];
  const newVal = !current;
  const update = {};
  if(inBloc1){ update['bloc1Paid']=newVal; update['bloc1PaidDate']=newVal?today:null; }
  if(inBloc2){ update['bloc2Paid']=newVal; update['bloc2PaidDate']=newVal?today:null; }
  await db.collection('players').doc(id).update(update);
  renderPayments();
}

async function toggleEmailAll(id, current, inBloc1, inBloc2){
  const today = new Date().toISOString().split('T')[0];
  const newVal = !current;
  const update = {};
  if(inBloc1){ update['bloc1EmailSent']=newVal; update['bloc1EmailDate']=newVal?today:null; }
  if(inBloc2){ update['bloc2EmailSent']=newVal; update['bloc2EmailDate']=newVal?today:null; }
  await db.collection('players').doc(id).update(update);
  renderPayments();
}

async function toggleEmail(id, bloc, current){

  update[bloc+'EmailSent'] = !current;
  update[bloc+'EmailDate'] = !current ? today : null;

  renderPayments();
}

async function togglePayment(id, bloc, current){
  const today = new Date().toISOString().split('T')[0];
  const update = {};
  update[bloc+'Paid'] = !current;
  update[bloc+'PaidDate'] = !current ? today : null;
  await db.collection('players').doc(id).update(update);

function renderSide(){
  const avail=Object.entries(spots).filter(([k,s])=>!s.reservedBy);
  let html=`<div class="side-title">Available spots <span class="side-badge">${avail.length}</span></div>`;
  if(!avail.length){html+=`<p class="side-empty">No spots available right now.</p>`;}
  else{avail.forEach(([key,s])=>{
    const g=GROUPS[s.group];
    html+=`<div class="side-item" onclick="showSpotModal('${key}')">
      <span class="gbadge ${g.badge}">${g.label}</span>
      <div class="side-date">${s.dateLabel}</div>
      <div class="side-price">$${g.price}</div>
    </div>`;
  });}
  document.getElementById('side-panel').innerHTML=html;
}

// ── SPOT ACTIONS ────────────────────────────────
async function addSpot(){
  const val=document.getElementById('spot-select').value;
  if(!val)return;
  const [grp,dId,dLabel]=val.split('||');
  await db.collection('spots').add({group:grp,dateId:dId,dateLabel:dLabel,reservedBy:null,createdAt:Date.now()});
}

async function removeSpot(key){
  if(!confirm('Remove this spot?'))return;
  await db.collection('spots').doc(key).delete();
  closeModal('modal-spot');
}

function showCellModal(dId,grp,dateLabel){
  const entries=getSpotsFor(dId,grp);
  const g=GROUPS[grp];
  document.getElementById('spot-title').textContent=g.label;
  document.getElementById('spot-sub').textContent=dateLabel;
  let body='';
  entries.forEach(([key,s])=>{
    const isRes=!!s.reservedBy;
    const mine=!currentUser.isAdmin&&isRes&&s.reservedBy===currentUser.name;
    body+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--surface2);border-radius:var(--radius);margin-bottom:6px;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="spot-dot ${isRes?'reserved':'avail'}" style="width:10px;height:10px;flex-shrink:0"></div>
        <div>
          <div style="font-size:13px;font-weight:500">${isRes?'Reserved by '+s.reservedBy:'Available'}</div>
          <div style="font-size:11px;color:var(--text3)">$${g.price}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        ${!isRes&&!currentUser.isAdmin&&canReserve(s)?`<button class="btn-primary" style="padding:5px 12px;font-size:12px;flex:none" onclick="reserveSpot('${key}')">Reserve</button>`:(!isRes&&!currentUser.isAdmin&&!canReserve(s)?`<span style="font-size:11px;color:var(--text3);font-style:italic">Wrong group</span>`:'')}
        ${mine?`<button class="btn-cancel" style="padding:5px 10px;font-size:12px" onclick="cancelReservation('${key}')">Cancel</button>`:''}
        ${isAdmin?`<button class="btn-red" onclick="removeSpot('${key}')">Remove</button>`:''}
      </div>
    </div>`;
  });
  if(!currentUser.isAdmin){
    body+=`<div class="info-box" style="margin-top:10px">
      <p>📧 <strong>E-transfer:</strong> ${ETRANSFER_EMAIL}</p>
      <p style="font-size:12px;margin-top:6px;color:var(--accent-text)">Send the amount after reserving your spot.</p>
      <p class="info-price">$${g.price}</p>
    </div>`;
  }
  document.getElementById('spot-body').innerHTML=body;
  document.getElementById('spot-actions').innerHTML=`<button class="btn-cancel" onclick="closeModal('modal-spot')" style="flex:1">Close</button>`;
  document.getElementById('modal-spot').style.display='block';
}

function showSpotModal(key){
  const s=spots[key]; if(!s) return;
  showCellModal(s.dateId,s.group,s.dateLabel);
}

async function reserveSpot(key){
  if(!spots[key]||spots[key].reservedBy)return;
  const spot = spots[key];
  // Check group permission
  if(!canReserve(spot)){
    alert('You can only reserve spots in your own group.');
    return;
  }
  await db.collection('spots').doc(key).update({reservedBy:currentUser.name});
  // If used cross-group permission, revoke it
  if(currentUser.crossGroupPermission && spotLevel(spot.group) !== currentUser.group){
    await db.collection('players').doc(currentUser.docId).update({crossGroupPermission:false});
    currentUser.crossGroupPermission = false;
    alert('Your one-time cross-group permission has been used.');
  }
  closeModal('modal-spot');
}

async function cancelReservation(key){
  if(!spots[key])return;
  if(spots[key].reservedBy!==currentUser.name){alert('You cannot cancel this reservation.');return;}
  await db.collection('spots').doc(key).update({reservedBy:null});
  closeModal('modal-spot');
}

// ── PLAYER ADMIN ────────────────────────────────
async function generatePin(){
  // Fetch all existing PINs from Firebase
  const snap = await db.collection('players').get();
  const usedPins = new Set(snap.docs.map(d => d.data().pin).filter(Boolean));
  let pin;
  do {
    pin = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
  } while (usedPins.has(pin));
  document.getElementById('new-pin').value = pin;
  document.getElementById('new-pin').style.background = 'var(--warn-bg)';
  document.getElementById('new-pin').style.fontWeight = '600';
  document.getElementById('new-pin').style.color = 'var(--warn)';
}

async function addPlayer(){
  const name=document.getElementById('new-name').value.trim();
  const email=document.getElementById('new-email').value.trim();
  const pin=document.getElementById('new-pin').value.trim();
  const group=document.getElementById('new-group').value;
  if(!name||!email||pin.length!==4){alert('Please fill in all fields and generate a PIN first.');return;}
  const pinHash=await sha256(pin);
  const subgroup=document.getElementById('new-subgroup').value;
  const inBloc1=document.getElementById('new-bloc1').checked;
  const inBloc2=document.getElementById('new-bloc2').checked;
  const price=group==='advanced'?250:78;
  await db.collection('players').add({name,email,pin,pinHash,group,subgroup,inBloc1,inBloc2,price});
  document.getElementById('new-name').value='';
  document.getElementById('new-email').value='';
  document.getElementById('new-pin').value='';
  document.getElementById('new-pin').style.background='';
  document.getElementById('new-pin').style.fontWeight='';
  document.getElementById('new-pin').style.color='';
  loadAdminPlayers();
}

async function seedBlocData(){
  if(!confirm('Update all player bloc enrollment from master Excel data? This will overwrite existing bloc/subgroup data.')) return;
  let updated=0;
  for(const p of BLOC_DATA){
    const snap=await db.collection('players').where('name','==',p.name).limit(1).get();
    if(!snap.empty){
      await snap.docs[0].ref.update({
        inBloc1:p.inBloc1, inBloc2:p.inBloc2,
        subgroup:p.subgroup, price:p.price
      });
      updated++;
    }
  }
  alert(`✅ Updated ${updated} players with bloc data.`);
  renderPayments();
}

async function toggleCrossGroup(id, name, current){
  const msg = current
    ? `Revoke cross-group permission for ${name}?`
    : `Grant one-time cross-group reservation permission to ${name}?`;
  if(!confirm(msg)) return;
  await db.collection('players').doc(id).update({crossGroupPermission: !current});
  loadAdminPlayers();
}

async function removePlayer(id){
  if(!confirm('Remove this player?'))return;
  await db.collection('players').doc(id).delete();
  loadAdminPlayers();
}



async function togglePaid(key){
  if(!spots[key]) return;
  const newVal = !spots[key].paid;
  await db.collection('spots').doc(key).update({paid: newVal});
}

function closeModal(id){document.getElementById(id).style.display='none';}

// Focus first PIN digit on load
document.getElementById('p0').focus();
