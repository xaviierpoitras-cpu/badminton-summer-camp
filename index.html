<style>
:root{
  --bg:#f7f6f2;--surface:#fff;--surface2:#f0ede6;--border:#e2ddd6;
  --text:#1a1814;--text2:#6b6660;--text3:#a09b96;
  --accent:#2d5a3d;--accent-bg:#eaf2ed;--accent-text:#1e3f2a;
  --warn:#92400e;--warn-bg:#fef3c7;
  --danger:#991b1b;--danger-bg:#fee2e2;
  --info:#1e40af;--info-bg:#eff6ff;
  --adv1:#2d5a3d;--adv1-bg:#eaf2ed;
  --adv2:#1e40af;--adv2-bg:#eff6ff;
  --int1:#6d28d9;--int1-bg:#f5f3ff;
  --int2:#b45309;--int2-bg:#fef3c7;
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:380px;max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{font-size:36px;display:block;margin-bottom:10px}
.login-card h2{font-size:20px;font-weight:600;margin-bottom:4px}
.login-card p{font-size:14px;color:var(--text2);margin-bottom:1.5rem;line-height:1.5}
.pin-wrap{display:flex;gap:10px;margin-bottom:1rem}
.pin-digit{width:60px;height:68px;font-size:28px;font-family:'DM Mono',monospace;font-weight:500;text-align:center;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.pin-digit:focus{border-color:var(--accent)}
.pin-error{font-size:13px;color:var(--danger);margin-bottom:8px;display:none}
.btn-login{width:100%;padding:12px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.btn-login:hover{opacity:.88}

/* HEADER */
.app-header{background:var(--accent);color:#fff;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px;flex-wrap:wrap}
.app-header h1{font-size:17px;font-weight:600}
.app-header p{font-size:11px;opacity:.7;font-family:'DM Mono',monospace}
.header-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.user-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 10px 4px 5px;font-size:12px;font-weight:500;color:#fff}
.user-av{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;font-family:'DM Mono',monospace}
.hbtn{padding:6px 12px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.8);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.hbtn:hover{background:rgba(255,255,255,.12);color:#fff}
.hbtn.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.4)}

/* LAYOUT */
.layout{display:flex;gap:0;min-height:calc(100vh - 56px)}
.main-area{flex:1;padding:1.25rem;overflow-x:auto;min-width:0}
.side-panel{width:260px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);padding:1rem;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}

/* LEGEND */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot-avail{background:#22c55e}
.dot-reserved{background:#f59e0b}
.dot-none{background:var(--border)}

/* GROUP BADGES */
.gbadge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace}
.gbadge-adv1{background:var(--adv1-bg);color:var(--adv1)}
.gbadge-adv2{background:var(--adv2-bg);color:var(--adv2)}
.gbadge-int1{background:var(--int1-bg);color:var(--int1)}
.gbadge-int2{background:var(--int2-bg);color:var(--int2)}

/* GRID */
.week-block{margin-bottom:1rem}
.week-title{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;margin-bottom:6px;padding:4px 0;border-bottom:1px solid var(--border)}
.grid-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.grid-table th{padding:9px 12px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
.grid-table th:first-child{text-align:left;min-width:100px}
.grid-table td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.grid-table td:first-child{text-align:left;font-size:13px;font-weight:500;color:var(--text);white-space:nowrap}
.grid-table tr:last-child td{border-bottom:none}
.grid-table tr:hover td{background:var(--surface2)}
.cell-na{color:var(--border);font-size:18px;line-height:1}
.cell-avail{cursor:pointer}
.cell-spot{display:inline-flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 8px;border-radius:var(--radius);transition:background .15s}
.cell-spot:hover{background:var(--surface2)}
.spot-dot{width:14px;height:14px;border-radius:50%}
.spot-dot.avail{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2)}
.spot-dot.reserved{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.spot-label{font-size:10px;color:var(--text3);white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis}

/* SIDE LIST */
.side-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.side-count{font-size:11px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace}
.side-item{padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .15s}
.side-item:hover{border-color:var(--accent);background:var(--accent-bg)}
.side-item-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:capitalize}
.side-item-price{font-size:12px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace}
.side-empty{font-size:13px;color:var(--text3);font-style:italic;text-align:center;padding:1rem 0}

/* ADMIN */
.admin-banner{background:var(--danger-bg);color:var(--danger);border:1px solid #fca5a5;border-radius:var(--radius);padding:8px 14px;font-size:13px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.add-spot-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:1rem}
.add-spot-form h3{font-size:14px;font-weight:600;margin-bottom:12px}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.form-group{flex:1;min-width:140px}
.form-group label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.form-group select{width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}

.admin-spot-info{font-size:13px;color:var(--text)}
.admin-spot-sub{font-size:11px;color:var(--text3);margin-top:2px}
.btn-del{padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-del:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-bg)}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.5rem;width:360px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15)}

.btn-cancel{padding:10px 18px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-cancel:hover{background:var(--surface2)}
.info-box{background:var(--accent-bg);border:1px solid #b6d9c4;border-radius:var(--radius);padding:14px 16px;margin-top:1rem}
.info-box p{font-size:14px;color:var(--accent-text);margin-bottom:5px}
.info-price{font-size:18px;font-weight:700;color:var(--accent-text);margin-top:8px;font-family:'DM Mono',monospace}
.reserved-box{background:var(--warn-bg);border:1px solid #fcd34d;border-radius:var(--radius);padding:12px 14px;margin-top:1rem;font-size:13px;color:var(--warn)}
.pw-error{font-size:12px;color:var(--danger);margin-top:6px;display:none}

@media(max-width:700px){
  .side-panel{display:none}
  .layout{flex-direction:column}
  .main-area{padding:.75rem}
  .pin-digit{width:52px;height:60px;font-size:24px}

// ── DATES ──────────────────────────────────────
const FR_DAYS=['dim','lun','mar','mer','jeu','ven','sam'];
const FR_MONTHS=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
function fmtDate(d){ return `${FR_DAYS[d.getDay()]} ${d.getDate()} ${FR_MONTHS[d.getMonth()]}`; }
function dateId(d){ return d.toISOString().split('T')[0]; }

function genSchedule(){
  const start=new Date(2026,6,6); // July 6
  const weeks=[];
  for(let w=0;w<6;w++){
    const days=[];
    // Mon=+0, Tue=+1, Wed=+2, Thu=+3
    [[0,'Mon'],[1,'Tue'],[2,'Wed'],[3,'Thu']].forEach(([off,key])=>{
      const d=new Date(start); d.setDate(d.getDate()+w*7+off);
      const isAdv=(key==='Mon'||key==='Wed'||key==='Thu');
      const isInt=(key==='Tue');
      const isFirst3=(w<3);
      days.push({
        date:d, label:fmtDate(d), id:dateId(d), key,
        groups: isAdv
          ? (isFirst3?['adv1']:['adv2'])
          : (isFirst3?['int1']:['int2'])
      });
    });
    weeks.push({week:w+1, days});
  }
  return weeks;
}
const SCHEDULE=genSchedule();

// ── STATE ──────────────────────────────────────
let spots={}, currentUser=null, isAdmin=false, pendingSpot=null, page='grid';

function saveSpots(){ localStorage.setItem('be_spots_v4',JSON.stringify(spots)); }
function loadSpots(){ try{ const s=localStorage.getItem('be_spots_v4'); spots=s?JSON.parse(s):{}; }catch(e){ spots={}; } }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function initials(n){ return n.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase(); }

// Get ALL spots for a specific date+group combo
function getSpots(dateId, grp){
  return Object.entries(spots).filter(([k,v])=>v.dateId===dateId && v.group===grp);
}

// ── PIN LOGIN ───────────────────────────────────
function pinInput(i){
  const v=document.getElementById(`p${i}`).value;
  if(v&&i<3) document.getElementById(`p${i+1}`).focus();
  document.getElementById('pin-error').style.display='none';
}
function pinKey(e,i){
  if(e.key==='Backspace'&&!document.getElementById(`p${i}`).value&&i>0) document.getElementById(`p${i-1}`).focus();
  if(e.key==='Enter') checkPin();
}
function getPin(){ return [0,1,2,3].map(i=>document.getElementById(`p${i}`).value).join(''); }

function checkPin(){
  const pin=getPin();
  if(pin.length<4){ document.getElementById('pin-error').style.display='block'; return; }
  let found=null;
  for(const grp of ['advanced','intermediate']){
    const p=PLAYERS_DB[grp].find(p=>p.pin===pin);
    if(p){ found={...p,group:grp}; break; }
  }
  if(!found){
    document.getElementById('pin-error').style.display='block';
    [0,1,2,3].forEach(i=>document.getElementById(`p${i}`).value='');
    document.getElementById('p0').focus();
    return;
  }
  currentUser=found;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  renderAll();
}
function logout(){ currentUser=null; isAdmin=false; document.getElementById('app').style.display='none'; document.getElementById('login-screen').style.display='flex'; [0,1,2,3].forEach(i=>document.getElementById(`p${i}`).value=''); }

// ── RENDER ──────────────────────────────────────
function renderAll(){ renderNav(); renderGrid(); renderSide(); }

function renderNav(){
  let html='';
  if(currentUser) html+=`<div class="user-pill"><div class="user-av">${initials(currentUser.name)}</div>${currentUser.name}</div>`;
  html+=`<button class="hbtn${isAdmin?' active':''}" onclick="handleAdmin()">${isAdmin?'⚙️ Admin':'🔒 Admin'}</button>`;
  html+=`<button class="hbtn" onclick="logout()">Changer →</button>`;
  document.getElementById('nav-btns').innerHTML=html;
}

function renderGrid(){
  let html='';
  if(isAdmin) html+=`<div class="admin-banner">🔐 Mode administrateur — tu peux ajouter et retirer des places</div>`+renderAdminForm();

  html+=`<div class="legend">
    <span style="font-size:12px;font-weight:500;color:var(--text2)">Légende :</span>
    <div class="legend-item"><div class="dot dot-avail"></div>Disponible</div>
    <div class="legend-item"><div class="dot dot-reserved"></div>Réservé</div>
    <div class="legend-item"><div class="dot dot-none"></div>Pas de pratique</div>
  </div>`;

  // Group header colors
  const thStyle={
    adv1:`style="color:var(--adv1)"`,
    adv2:`style="color:var(--adv2)"`,
    int1:`style="color:var(--int1)"`,
    int2:`style="color:var(--int2)"`,
  };

  SCHEDULE.forEach(({week,days})=>{
    const wStart=days[0].label, wEnd=days[days.length-1].label;
    html+=`<div class="week-block">
      <div class="week-title">Semaine ${week} &nbsp;·&nbsp; ${cap(wStart)} – ${cap(wEnd)}</div>
      <table class="grid-table">
        <thead><tr>
          <th>Date</th>
          <th ${thStyle.adv1}>Avancé 1<br><span style="font-size:10px;font-weight:400;opacity:.7">Sem. 1–3 · Lun/Mer/Jeu</span></th>
          <th ${thStyle.adv2}>Avancé 2<br><span style="font-size:10px;font-weight:400;opacity:.7">Sem. 4–6 · Lun/Mer/Jeu</span></th>
          <th ${thStyle.int1}>Intermédiaire 1<br><span style="font-size:10px;font-weight:400;opacity:.7">Sem. 1–3 · Mar</span></th>
          <th ${thStyle.int2}>Intermédiaire 2<br><span style="font-size:10px;font-weight:400;opacity:.7">Sem. 4–6 · Mar</span></th>
        </tr></thead>
        <tbody>`;
    days.forEach(day=>{
      html+=`<tr><td>${cap(day.label)}</td>`;
      ['adv1','adv2','int1','int2'].forEach(grp=>{
        const practicesThisDay=day.groups.includes(grp);
        if(!practicesThisDay){
          html+=`<td><span class="cell-na">—</span></td>`;
        } else {
          const entry=getSpots(day.id,grp);
          const entries=getSpots(day.id,grp);
          if(!entries.length){
            html+=`<td><span style="font-size:11px;color:var(--text3)">–</span></td>`;
          } else {
            const avail=entries.filter(([k,s])=>!s.reservedBy).length;
            const reserved=entries.filter(([k,s])=>s.reservedBy).length;
            html+=`<td style="cursor:pointer" onclick="showDateGroupModal('${day.id}','${grp}','${cap(day.label)}')">
              <div style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px">
                <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">
                  ${entries.map(([k,s])=>`<div class="spot-dot ${s.reservedBy?'reserved':'avail'}" title="${s.reservedBy?'Réservé par '+s.reservedBy:'Disponible'}"></div>`).join('')}
                </div>
                <div style="font-size:10px;color:var(--text3)">${avail>0?avail+' dispo':''} ${reserved>0?reserved+' rés.':''}</div>
              </div></td>`;
          }
        }
      });
      html+=`</tr>`;
    });
    html+=`</tbody></table></div>`;
  });

  if(isAdmin) html+=renderAdminSpotList();
  document.getElementById('main-area').innerHTML=html;
}

function renderAdminForm(){
  // Build date options per group
  const groupDates={adv1:[],adv2:[],int1:[],int2:[]};
  SCHEDULE.forEach(({days})=>{
    days.forEach(day=>{
      day.groups.forEach(g=>{ groupDates[g].push({id:day.id,label:day.label}); });
    });
  });
  let dateOpts='';
  Object.entries(groupDates).forEach(([grp,dates])=>{
    dates.forEach(d=>{
      dateOpts+=`<option value="${grp}||${d.id}">[${GROUPS[grp].label}] ${cap(d.label)}</option>`;
    });
  });
  return `<div class="add-spot-form">
    <h3>➕ Ajouter une place disponible</h3>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Groupe & date</label>
        <select id="add-select">${dateOpts||'<option>Toutes les places sont déjà affichées</option>'}</select>
      </div>
    </div>
    <button class="btn-add-spot" onclick="adminAddSpot()">Ajouter</button>
  </div>`;
}

function renderAdminSpotList(){
  const all=Object.entries(spots);
  if(!all.length) return `<div class="admin-spot-list"><h3>Places affichées (0)</h3><p style="font-size:13px;color:var(--text3);font-style:italic">Aucune place affichée.</p></div>`;
  let html=`<div class="admin-spot-list"><h3>Places affichées (${all.length})</h3>`;
  all.forEach(([key,s])=>{
    const g=GROUPS[s.group];
    const resLabel=s.reservedBy?`Réservé par ${s.reservedBy}`:'Disponible';
    html+=`<div class="admin-spot-item">
      <div>
        <div class="admin-spot-info"><span class="gbadge ${g.badge}">${g.label}</span> &nbsp;${cap(s.dateLabel)}</div>
        <div class="admin-spot-sub">${resLabel} · $${g.price}</div>
      </div>
      <button class="btn-del" onclick="adminRemove('${key}')">Retirer</button>
    </div>`;
  });
  return html+`</div>`;
}

function renderSide(){
  const avail=Object.entries(spots).filter(([k,s])=>!s.reservedBy);
  let html=`<div class="side-title">Places disponibles <span class="side-count">${avail.length}</span></div>`;
  if(!avail.length){
    html+=`<p class="side-empty">Aucune place disponible pour le moment.</p>`;
  } else {
    avail.forEach(([key,s])=>{
      const g=GROUPS[s.group];
      html+=`<div class="side-item" onclick="showSpotModal('${key}')">
        <div><span class="gbadge ${g.badge}">${g.label}</span></div>
        <div class="side-item-date" style="margin-top:4px">${cap(s.dateLabel)}</div>
        <div class="side-item-price">$${g.price}</div>
      </div>`;
    });
  }
  document.getElementById('side-panel').innerHTML=html;
}

// ── SPOT MODAL ──────────────────────────────────
function showSpotModal(key){
  const s=spots[key]; if(!s) return;
  const g=GROUPS[s.group];
  document.getElementById('res-title').textContent=g.label;
  document.getElementById('res-sub').textContent=cap(s.dateLabel);

  if(s.reservedBy){
    const mine=currentUser&&!currentUser.isAdmin&&s.reservedBy===currentUser.name;
    document.getElementById('res-body').innerHTML=`
      <div class="reserved-box">⏳ Cette place est réservée par <strong>${s.reservedBy}</strong>.</div>`;
    document.getElementById('res-actions').innerHTML=`
      ${mine?`<button class="btn-primary" style="background:var(--danger)" onclick="cancelReserve('${key}')">Annuler ma réservation</button>`:''}
      <button class="btn-cancel" onclick="closeModal('modal-reserve')" style="flex:1">Fermer</button>`;
  } else {
    document.getElementById('res-body').innerHTML=`
      <div class="info-box">
        <p>📧 <strong>E-transfer :</strong> ${ETRANSFER_EMAIL}</p>
        <p class="info-price">$${g.price}</p>
        <p style="font-size:12px;margin-top:8px;color:var(--accent-text)">Envoie le montant à cet email et cette place te sera confirmée.</p>
      </div>`;
    document.getElementById('res-actions').innerHTML=`
      <button class="btn-cancel" onclick="closeModal('modal-reserve')">Fermer</button>
      <button class="btn-primary" onclick="reserveSpot('${key}')">Réserver ma place</button>`;
  }
  document.getElementById('modal-reserve').style.display='block';
}

function reserveSpot(key){
  if(!spots[key]||spots[key].reservedBy) return;
  spots[key].reservedBy=currentUser.name;
  saveSpots(); closeModal('modal-reserve'); renderGrid(); renderSide();
}

function cancelReserve(key){
  if(!spots[key]) return;
  if(spots[key].reservedBy!==currentUser.name){ alert('Tu ne peux pas annuler cette réservation.'); return; }
  spots[key].reservedBy=null;
  saveSpots(); closeModal('modal-reserve'); renderGrid(); renderSide();
}

// ── ADMIN ───────────────────────────────────────
function showAdminLogin(){
  document.getElementById('admin-pw').value='';
  document.getElementById('pw-error').style.display='none';
  document.getElementById('modal-admin').style.display='block';
}
function handleAdmin(){
  if(isAdmin){ renderAll(); }
  else{ showAdminLogin(); }
}
function checkAdmin(){
  if(document.getElementById('admin-pw').value===ADMIN_PW){
    isAdmin=true;
    closeModal('modal-admin');
    // If admin logged in from login screen (no currentUser), enter admin-only mode
    if(!currentUser){
      currentUser={name:'Admin',email:'',group:'advanced',isAdmin:true};
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='block';
    }
    renderAll();
  } else { document.getElementById('pw-error').style.display='block'; }
}

function showDateGroupModal(dateId, grp, dateLabel){
  const entries=getSpots(dateId,grp);
  const g=GROUPS[grp];
  document.getElementById('res-title').textContent=g.label;
  document.getElementById('res-sub').textContent=dateLabel;
  let body='', actions='';
  if(!entries.length){ closeModal('modal-reserve'); return; }
  entries.forEach(([key,s])=>{
    const isRes=!!s.reservedBy;
    const mine=isRes&&currentUser&&s.reservedBy===currentUser.name;
    const adminCanDel=isAdmin;
    body+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface2);border-radius:var(--radius);margin-bottom:6px;gap:8px">
      <div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="spot-dot ${isRes?'reserved':'avail'}" style="width:10px;height:10px"></div>
          <span style="font-size:13px;font-weight:500">${isRes?'Réservé par '+s.reservedBy:'Disponible'}</span>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">$${g.price}</div>
      </div>
      <div style="display:flex;gap:6px">
        ${!isRes&&!currentUser.isAdmin?`<button class="btn-primary" style="padding:5px 10px;font-size:12px" onclick="reserveSpot('${key}')">Réserver</button>`:''}
        ${mine?`<button class="btn-cancel" style="padding:5px 10px;font-size:12px" onclick="cancelReserve('${key}')">Annuler</button>`:''}
        ${adminCanDel?`<button class="btn-del" onclick="adminRemove('${key}')">🗑</button>`:''}
      </div>
    </div>`;
  });
  if(!currentUser.isAdmin){
    body+=`<div class="info-box" style="margin-top:10px">
      <p>📧 <strong>E-transfer :</strong> ${ETRANSFER_EMAIL}</p>
      <p style="font-size:12px;margin-top:6px;color:var(--accent-text)">Envoie le montant après réservation.</p>
    </div>`;
  }
  document.getElementById('res-body').innerHTML=body;
  document.getElementById('res-actions').innerHTML=`<button class="btn-cancel" onclick="closeModal('modal-reserve')" style="flex:1">Fermer</button>`;
  document.getElementById('modal-reserve').style.display='block';
}
function adminAddSpot(){
  const val=document.getElementById('add-select').value;
  if(!val||!val.includes('||')) return;
  const [grp,dateId]=val.split('||');
  // Find date label
  let dateLabel='';
  SCHEDULE.forEach(({days})=>days.forEach(d=>{ if(d.id===dateId) dateLabel=d.label; }));
  const key=`spot_${Date.now()}`;
  spots[key]={group:grp,dateId,dateLabel,reservedBy:null};
  saveSpots(); renderAll();
}
function adminRemove(key){
  if(!confirm('Retirer cette place?')) return;
  delete spots[key]; saveSpots(); closeModal('modal-reserve'); renderAll();
}

function closeModal(id){ document.getElementById(id).style.display='none'; }

loadSpots();
document.getElementById('p0').focus();
</script>
</body>
</html>
