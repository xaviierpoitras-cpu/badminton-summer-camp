:root{
  --bg:#f7f6f2;--surface:#fff;--surface2:#f0ede6;--border:#e2ddd6;
  --text:#1a1814;--text2:#6b6660;--text3:#a09b96;
  --accent:#2d5a3d;--accent-bg:#eaf2ed;--accent-text:#1e3f2a;
  --warn:#92400e;--warn-bg:#fef3c7;
  --danger:#991b1b;--danger-bg:#fee2e2;
  --adv1:#2d5a3d;--adv1-bg:#eaf2ed;
  --adv2:#1e40af;--adv2-bg:#eff6ff;
  --int1:#6d28d9;--int1-bg:#f5f3ff;
  --int2:#b45309;--int2-bg:#fef3c7;
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:380px;max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{font-size:36px;display:block;margin-bottom:10px}
.login-card h2{font-size:20px;font-weight:600;margin-bottom:4px}
.login-card .sub{font-size:14px;color:var(--text2);margin-bottom:1.5rem;line-height:1.5}
.pin-wrap{display:flex;gap:10px;margin-bottom:1rem}
.pin-digit{width:60px;height:68px;font-size:28px;font-family:'DM Mono',monospace;font-weight:500;text-align:center;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.pin-digit:focus{border-color:var(--accent)}
.pin-error{font-size:13px;color:var(--danger);margin-bottom:8px;display:none}
.btn-login{width:100%;padding:12px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.btn-login:hover{opacity:.88}
.admin-link{display:block;text-align:center;margin-top:1rem;font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;text-decoration:underline}
.admin-fields{display:none;margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem}
.admin-fields input{width:100%;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:8px}
.admin-fields input:focus{border-color:var(--accent)}
.loading-msg{font-size:13px;color:var(--text3);text-align:center;padding:1rem 0;display:none}

/* HEADER */
.app-header{background:var(--accent);color:#fff;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px;flex-wrap:wrap}
.app-header h1{font-size:17px;font-weight:600}
.app-header p{font-size:11px;opacity:.7;font-family:'DM Mono',monospace}
.header-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.user-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 10px 4px 5px;font-size:12px;font-weight:500;color:#fff}
.user-av{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;font-family:'DM Mono',monospace}
.hbtn{padding:6px 12px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.8);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.hbtn:hover{background:rgba(255,255,255,.12);color:#fff}
.hbtn.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.4)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 56px)}
.main-area{flex:1;padding:1.25rem;overflow-x:auto;min-width:0}
.side-panel{width:260px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);padding:1rem;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}

/* LEGEND */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot-avail{background:#22c55e}
.dot-reserved{background:#f59e0b}

/* GROUP BADGES */
.gbadge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace}
.gbadge-adv1{background:var(--adv1-bg);color:var(--adv1)}
.gbadge-adv2{background:var(--adv2-bg);color:var(--adv2)}
.gbadge-int1{background:var(--int1-bg);color:var(--int1)}
.gbadge-int2{background:var(--int2-bg);color:var(--int2)}

/* GRID */
.week-block{margin-bottom:1rem}
.week-title{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;margin-bottom:6px;padding:4px 0;border-bottom:1px solid var(--border)}
.grid-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.grid-table th{padding:9px 12px;text-align:center;font-size:12px;font-weight:600;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
.grid-table th:first-child{text-align:left;min-width:100px}
.grid-table td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.grid-table td:first-child{text-align:left;font-size:13px;font-weight:500;color:var(--text);white-space:nowrap}
.grid-table tr:last-child td{border-bottom:none}
.grid-table tr:hover td{background:var(--surface2)}
.spot-dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.spot-dot.avail{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2)}
.spot-dot.reserved{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.cell-btn{cursor:pointer;padding:4px 8px;border-radius:var(--radius);display:inline-flex;flex-direction:column;align-items:center;gap:3px;transition:background .15s}
.cell-btn:hover{background:var(--surface2)}
.cell-count{font-size:10px;color:var(--text3)}

/* SIDE */

.side-badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace}

.side-item:hover{border-color:var(--accent);background:var(--accent-bg)}

.side-price{font-size:12px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace;margin-top:2px}
.side-empty{font-size:13px;color:var(--text3);font-style:italic;text-align:center;padding:1rem 0}

/* ADMIN */

.btn-cancel{padding:10px 18px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-cancel:hover{background:var(--surface2)}
.info-box{background:var(--accent-bg);border:1px solid #b6d9c4;border-radius:var(--radius);padding:14px 16px;margin-top:1rem}
.info-box p{font-size:14px;color:var(--accent-text);margin-bottom:5px}

.warn-box{background:var(--warn-bg);border:1px solid #fcd34d;border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--warn)}

@media(max-width:700px){
  .side-panel{display:none}
  .layout{flex-direction:column}
  .main-area{padding:.75rem}
  .pin-digit{width:52px;height:60px;font-size:24px}
}

const FR_DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d){return `${FR_DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;}
function dateId(d){return d.toISOString().split('T')[0];}

function genSchedule(){
  const start=new Date(2026,6,6);
  const weeks=[];
  for(let w=0;w<6;w++){
    const days=[];
    [[0,'Mon'],[1,'Tue'],[2,'Wed'],[3,'Thu']].forEach(([off,key])=>{
      const d=new Date(start);d.setDate(d.getDate()+w*7+off);
      const isFirst3=w<3;
      days.push({date:d,label:fmtDate(d),id:dateId(d),key,
        groups:key==='Tue'?(isFirst3?['int1']:['int2']):(isFirst3?['adv1']:['adv2'])
      });
    });
    weeks.push({week:w+1,days});
  }
  return weeks;
}
const SCHEDULE=genSchedule();

let currentUser=null,isAdmin=false,spots={};

// SHA-256 hash for PINs
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Real-time spots listener
function startSpotsListener(){

    spots={};

  });
}

// ── LOGIN ──────────────────────────────────────
function pinInput(i){
  const v=document.getElementById(`p${i}`).value;
  if(v&&i<3)document.getElementById(`p${i+1}`).focus();
  document.getElementById('pin-error').style.display='none';
}
function pinKey(e,i){
  if(e.key==='Backspace'&&!document.getElementById(`p${i}`).value&&i>0)document.getElementById(`p${i-1}`).focus();
  if(e.key==='Enter')checkPin();
}
function getPin(){return [0,1,2,3].map(i=>document.getElementById(`p${i}`).value).join('');}

async function checkPin(){
  const pin=getPin();
  if(pin.length<4){document.getElementById('pin-error').style.display='block';return;}
  document.getElementById('loading-msg').style.display='block';
  document.getElementById('pin-error').style.display='none';
  try{
    await auth.signInAnonymously();
    const hash=await sha256(pin);
    const snap=await db.collection('players').where('pinHash','==',hash).limit(1).get();
    if(snap.empty){
      document.getElementById('pin-error').style.display='block';
      document.getElementById('loading-msg').style.display='none';
      [0,1,2,3].forEach(i=>document.getElementById(`p${i}`).value='');
      document.getElementById('p0').focus();
    } else {
      currentUser={...snap.docs[0].data(),docId:snap.docs[0].id};
      enterApp();
    }
  } catch(e){
    document.getElementById('pin-error').textContent='Connection error. Try again.';
    document.getElementById('pin-error').style.display='block';
    document.getElementById('loading-msg').style.display='none';
  }
}

function toggleAdminFields(){
  const f=document.getElementById('admin-fields');
  f.style.display=f.style.display==='block'?'none':'block';
}

async function adminLogin(){
  const email=document.getElementById('admin-email').value.trim();
  const pw=document.getElementById('admin-password').value;
  document.getElementById('admin-error').style.display='none';
  try{
    await auth.signInWithEmailAndPassword(email,pw);
    isAdmin=true;
    currentUser={name:'Admin',email,group:'advanced',isAdmin:true};
    enterApp();
  } catch(e){
    document.getElementById('admin-error').style.display='block';
  }
}

function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('loading-msg').style.display='none';
  startSpotsListener();
  renderAll();
}

function logout(){
  auth.signOut();
  currentUser=null;isAdmin=false;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('admin-fields').style.display='none';
  [0,1,2,3].forEach(i=>document.getElementById(`p${i}`).value='');
  document.getElementById('pin-error').style.display='none';
  document.getElementById('pin-error').textContent='Incorrect PIN. Contact the organizer.';
}

// ── RENDER ──────────────────────────────────────
function renderAll(){renderNav();renderGrid();renderSide();}
function initials(n){return n.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();}

function renderNav(){
  let html='';
  if(currentUser&&!currentUser.isAdmin)
    html+=`<div class="user-pill"><div class="user-av">${initials(currentUser.name)}</div>${currentUser.name}</div>`;
  if(isAdmin)
    html+=`<span style="background:rgba(255,255,255,.2);color:#fff;font-size:12px;padding:5px 10px;border-radius:20px;font-weight:500">⚙️ Admin</span>`;
  html+=`<button class="hbtn" onclick="logout()">Sign out</button>`;
  document.getElementById('nav-btns').innerHTML=html;
}

function getSpotsFor(dateId,grp){
  return Object.entries(spots).filter(([k,v])=>v.dateId===dateId&&v.group===grp);
}

function renderGrid(){
  let html='';
  if(isAdmin) html+=`<div class="admin-banner">🔐 Administrator mode</div>`+renderAdminPanel();

  html+=`<div class="legend">
    <span style="font-size:12px;font-weight:500;color:var(--text2)">Legend:</span>
    <div class="legend-item"><div class="dot dot-avail"></div>Available</div>
    <div class="legend-item"><div class="dot dot-reserved"></div>Reserved</div>
  </div>`;

  const thColors={adv1:'var(--adv1)',adv2:'var(--adv2)',int1:'var(--int1)',int2:'var(--int2)'};

  SCHEDULE.forEach(({week,days})=>{
    html+=`<div class="week-block">
      <div class="week-title">Week ${week} &nbsp;·&nbsp; ${days[0].label} – ${days[3].label}</div>
      <table class="grid-table">
        <thead><tr><th>Date</th>
          ${Object.entries(GROUPS).map(([g,info])=>`<th style="color:${thColors[g]}">${info.label}<br><span style="font-size:10px;font-weight:400;opacity:.7">${info.weeks}</span></th>`).join('')}
        </tr></thead>
        <tbody>`;
    days.forEach(day=>{
      html+=`<tr><td>${day.label}</td>`;
      Object.keys(GROUPS).forEach(grp=>{
        if(!day.groups.includes(grp)){html+=`<td style="color:var(--border);font-size:16px">—</td>`;return;}
        const entries=getSpotsFor(day.id,grp);
        if(!entries.length){html+=`<td><span style="font-size:11px;color:var(--text3)">–</span></td>`;return;}
        const avail=entries.filter(([k,s])=>!s.reservedBy).length;
        const res=entries.filter(([k,s])=>s.reservedBy).length;
        html+=`<td><div class="cell-btn" onclick="showCellModal('${day.id}','${grp}','${day.label}')">
          <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">
            ${entries.map(([k,s])=>`<div class="spot-dot ${s.reservedBy?'reserved':'avail'}"></div>`).join('')}
          </div>
          <div class="cell-count">${avail?avail+' avail':''}${avail&&res?' · ':''}${res?res+' res.':''}</div>
        </div></td>`;
      });
      html+=`</tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById('main-area').innerHTML=html;
}

function renderAdminPanel(){
  // Build date+group options
  let opts='';
  SCHEDULE.forEach(({days})=>days.forEach(day=>{
    day.groups.forEach(grp=>{
      opts+=`<option value="${grp}||${day.id}||${day.label}">[${GROUPS[grp].label}] ${day.label}</option>`;
    });
  }));

  // Existing spots list
  const allSpots=Object.entries(spots);
  let spotRows=allSpots.length?allSpots.map(([key,s])=>{
    const g=GROUPS[s.group];
    return `<div class="admin-row">
      <div><div class="admin-row-info"><span class="gbadge ${g.badge}">${g.label}</span> ${s.dateLabel}</div>
      <div class="admin-row-sub">${s.reservedBy?'Reserved by '+s.reservedBy:'Available'} · $${g.price}</div></div>
      <button class="btn-red" onclick="removeSpot('${key}')">Remove</button>
    </div>`;
  }).join(''):'<p style="font-size:13px;color:var(--text3);font-style:italic">No spots posted.</p>';

  // Players list
  let playerPanel=renderAdminPlayers();

  return `
  <div class="panel">
    <h3>➕ Add available spot</h3>
    <div class="form-row">
      <div class="form-group"><label>Group & date</label><select id="spot-select">${opts}</select></div>
    </div>
    <button class="btn-green" onclick="addSpot()">Add spot</button>
  </div>
  <div class="panel"><h3>All posted spots (${allSpots.length})</h3>${spotRows}</div>
  ${playerPanel}`;
}

function renderAdminPlayers(){
  // We'll load players async — render a placeholder that gets filled
  setTimeout(loadAdminPlayers, 100);
  return `<div class="panel" id="player-panel">
    <h3>👥 Players</h3>
    <p style="font-size:13px;color:var(--text3)">Loading...</p>
  </div>`;
}

async function loadAdminPlayers(){
  const panel=document.getElementById('player-panel');
  if(!panel) return;
  try{
    const snap=await db.collection('players').orderBy('name').get();
    const players=snap.docs.map(d=>({id:d.id,...d.data()}));
    let html=`<div class="panel" id="player-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3>👥 Players (${players.length})</h3>
        <button class="seed-btn" onclick="seedPlayers()" title="Upload initial player list to Firebase">Seed initial players</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Name</label><input id="new-name" placeholder="Full name"/></div>
        <div class="form-group"><label>Email</label><input id="new-email" type="email" placeholder="parent@email.com"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>PIN</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input id="new-pin" placeholder="Auto-generated" maxlength="4" type="tel" style="flex:1" readonly/>
          <button onclick="generatePin()" style="padding:8px 12px;border-radius:var(--radius);border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent-text);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif">Generate →</button>
        </div>
      </div>
        <div class="form-group"><label>Group</label><select id="new-group">
          <option value="advanced">Advanced</option>
          <option value="intermediate">Intermediate</option>
        </select></div>
      </div>
      <button class="btn-green" onclick="addPlayer()">Add player</button>
      <div style="margin-top:14px">`;
    if(!players.length){html+=`<p style="font-size:13px;color:var(--text3);font-style:italic">No players yet. Click "Seed initial players" to upload.</p>`;}
    else{ players.forEach(p=>{
      html+=`<div class="admin-row">
        <div><div class="admin-row-info">${p.name} <span style="font-size:11px;color:var(--text3)">(${p.group})</span> <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:600;background:var(--warn-bg);color:var(--warn);padding:2px 8px;border-radius:20px">${p.pin||'—'}</span></div>
        <div class="admin-row-sub">${p.email}</div></div>
        <button class="btn-red" onclick="removePlayer('${p.id}')">Remove</button>
      </div>`;
    }); }
    html+=`</div></div>`;
    panel.outerHTML=html;
  } catch(e){ panel.innerHTML=`<div class="panel" id="player-panel"><h3>👥 Players</h3><p style="color:var(--danger);font-size:13px">Error loading players.</p></div>`; }
}

function renderSide(){
  const avail=Object.entries(spots).filter(([k,s])=>!s.reservedBy);
  let html=`<div class="side-title">Available spots <span class="side-badge">${avail.length}</span></div>`;
  if(!avail.length){html+=`<p class="side-empty">No spots available right now.</p>`;}
  else{avail.forEach(([key,s])=>{
    const g=GROUPS[s.group];
    html+=`<div class="side-item" onclick="showSpotModal('${key}')">
      <span class="gbadge ${g.badge}">${g.label}</span>
      <div class="side-date">${s.dateLabel}</div>
      <div class="side-price">$${g.price}</div>
    </div>`;
  });}
  document.getElementById('side-panel').innerHTML=html;
}

// ── SPOT ACTIONS ────────────────────────────────
async function addSpot(){
  const val=document.getElementById('spot-select').value;
  if(!val)return;
  const [grp,dId,dLabel]=val.split('||');
  await db.collection('spots').add({group:grp,dateId:dId,dateLabel:dLabel,reservedBy:null,createdAt:Date.now()});
}

async function removeSpot(key){
  if(!confirm('Remove this spot?'))return;
  await db.collection('spots').doc(key).delete();
  closeModal('modal-spot');
}

function showCellModal(dId,grp,dateLabel){
  const entries=getSpotsFor(dId,grp);
  const g=GROUPS[grp];
  document.getElementById('spot-title').textContent=g.label;
  document.getElementById('spot-sub').textContent=dateLabel;
  let body='';
  entries.forEach(([key,s])=>{
    const isRes=!!s.reservedBy;
    const mine=!currentUser.isAdmin&&isRes&&s.reservedBy===currentUser.name;
    body+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--surface2);border-radius:var(--radius);margin-bottom:6px;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="spot-dot ${isRes?'reserved':'avail'}" style="width:10px;height:10px;flex-shrink:0"></div>
        <div>
          <div style="font-size:13px;font-weight:500">${isRes?'Reserved by '+s.reservedBy:'Available'}</div>
          <div style="font-size:11px;color:var(--text3)">$${g.price}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        ${!isRes&&!currentUser.isAdmin?`<button class="btn-primary" style="padding:5px 12px;font-size:12px;flex:none" onclick="reserveSpot('${key}')">Reserve</button>`:''}
        ${mine?`<button class="btn-cancel" style="padding:5px 10px;font-size:12px" onclick="cancelReservation('${key}')">Cancel</button>`:''}
        ${isAdmin?`<button class="btn-red" onclick="removeSpot('${key}')">Remove</button>`:''}
      </div>
    </div>`;
  });
  if(!currentUser.isAdmin){
    body+=`<div class="info-box" style="margin-top:10px">
      <p>📧 <strong>E-transfer:</strong> ${ETRANSFER_EMAIL}</p>
      <p style="font-size:12px;margin-top:6px;color:var(--accent-text)">Send the amount after reserving your spot.</p>
      <p class="info-price">$${g.price}</p>
    </div>`;
  }
  document.getElementById('spot-body').innerHTML=body;
  document.getElementById('spot-actions').innerHTML=`<button class="btn-cancel" onclick="closeModal('modal-spot')" style="flex:1">Close</button>`;
  document.getElementById('modal-spot').style.display='block';
}

function showSpotModal(key){
  const s=spots[key]; if(!s) return;
  showCellModal(s.dateId,s.group,s.dateLabel);
}

async function reserveSpot(key){
  if(!spots[key]||spots[key].reservedBy)return;
  await db.collection('spots').doc(key).update({reservedBy:currentUser.name});
  closeModal('modal-spot');
}

async function cancelReservation(key){
  if(!spots[key])return;
  if(spots[key].reservedBy!==currentUser.name){alert('You cannot cancel this reservation.');return;}
  await db.collection('spots').doc(key).update({reservedBy:null});
  closeModal('modal-spot');
}

// ── PLAYER ADMIN ────────────────────────────────
async function generatePin(){
  // Fetch all existing PINs from Firebase
  const snap = await db.collection('players').get();
  const usedPins = new Set(snap.docs.map(d => d.data().pin).filter(Boolean));
  let pin;
  do {
    pin = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
  } while (usedPins.has(pin));
  document.getElementById('new-pin').value = pin;
  document.getElementById('new-pin').style.background = 'var(--warn-bg)';
  document.getElementById('new-pin').style.fontWeight = '600';
  document.getElementById('new-pin').style.color = 'var(--warn)';
}

async function addPlayer(){
  const name=document.getElementById('new-name').value.trim();
  const email=document.getElementById('new-email').value.trim();
  const pin=document.getElementById('new-pin').value.trim();
  const group=document.getElementById('new-group').value;
  if(!name||!email||pin.length!==4){alert('Please fill in all fields and generate a PIN first.');return;}
  const pinHash=await sha256(pin);
  await db.collection('players').add({name,email,pin,pinHash,group});
  document.getElementById('new-name').value='';
  document.getElementById('new-email').value='';
  document.getElementById('new-pin').value='';
  document.getElementById('new-pin').style.background='';
  document.getElementById('new-pin').style.fontWeight='';
  document.getElementById('new-pin').style.color='';
  loadAdminPlayers();
}

async function removePlayer(id){
  if(!confirm('Remove this player?'))return;
  await db.collection('players').doc(id).delete();
  loadAdminPlayers();
}

async function seedPlayers(){
  if(!confirm(`Upload ${SEED_PLAYERS.advanced.length + SEED_PLAYERS.intermediate.length} players to Firebase? Only do this once.`))return;
  const allPlayers=[
    ...SEED_PLAYERS.advanced.map(p=>({...p,group:'advanced'})),
    ...SEED_PLAYERS.intermediate.map(p=>({...p,group:'intermediate'}))
  ];
  let count=0;
  for(const p of allPlayers){
    const pinHash=await sha256(p.pin);
    await db.collection('players').add({name:p.name,email:p.email,pin:p.pin,pinHash,group:p.group});
    count++;
  }
  alert(`✅ ${count} players uploaded to Firebase.`);
  loadAdminPlayers();
}

function closeModal(id){document.getElementById(id).style.display='none';}

// Focus first PIN digit on load
document.getElementById('p0').focus();
</script>
</body>
</html>
